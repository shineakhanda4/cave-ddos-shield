<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Login - Cave DDoS Shield</title>
    <link rel="icon" id="favicon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-gradient: linear-gradient(135deg, #2d4a7c 0%, #1a2d4e 100%);
            --cave-accent: #c4a668;
            --bg-dark: #0a0e1a;
            --bg-card: rgba(20, 30, 50, 0.7);
            --border-color: rgba(196, 166, 104, 0.15);
            --text-primary: #f0e6d3;
            --text-secondary: #a89878;
        }
        
        body {
            font-family: 'Segoe UI', 'Caveat', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a2536 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><path d="M0 100 L50 40 L100 60 L150 20 L200 50 L200 100 Z" fill="rgba(196,166,104,0.03)"/></svg>') repeat-x bottom;
            pointer-events: none;
        }
        
        .login-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(196, 166, 104, 0.1) inset;
            position: relative;
            z-index: 1;
        }
        
        .login-container::before {
            content: '🏔️';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            background: var(--bg-card);
            padding: 0 15px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #c4a668 0%, #e8d5a8 50%, #c4a668 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(196, 166, 104, 0.2);
        }
        
        .logo p {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-style: italic;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 14, 26, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--cave-accent);
            background: rgba(20, 30, 50, 0.8);
            box-shadow: 0 0 15px rgba(196, 166, 104, 0.2);
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2d4a7c 0%, #1a2d4e 100%);
            border: 1px solid var(--cave-accent);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 74, 124, 0.3), 0 0 15px rgba(196, 166, 104, 0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error {
            background: rgba(196, 90, 90, 0.15);
            border: 1px solid #c45a5a;
            color: #e07070;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }
        
        .info {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.85em;
            font-style: italic;
        }
        
        .cave-decoration {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            text-align: center;
            color: rgba(196, 166, 104, 0.3);
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1><span id="headerIcon">🏔️</span> <span id="siteName">Cave DDoS Shield</span></h1>
            <p>Enter the protected cavern</p>
        </div>
        
        <div id="error" class="error"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Guardian Name</label>
                <input type="text" id="username" name="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Cave Key</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            
            <button type="submit" class="btn" id="loginBtn">Enter Cave</button>
        </form>
        
        <div class="info">
            Default: admin / admin123
        </div>
    </div>
    
    <div class="cave-decoration">
        ◆ Deep within the mountain ◆
    </div>
    
    <script>
        // Load custom settings
        function loadCustomSettings() {
            const settings = JSON.parse(localStorage.getItem('siteSettings') || '{}');
            if (settings.siteName) {
                document.getElementById('siteName').textContent = settings.siteName;
                document.getElementById('pageTitle').textContent = `Login - ${settings.siteName}`;
            }
            if (settings.headerIcon) {
                document.getElementById('headerIcon').textContent = settings.headerIcon;
            }
            if (settings.favicon) {
                document.getElementById('favicon').href = settings.favicon;
            }
        }
        
        loadCustomSettings();
        
        const form = document.getElementById('loginForm');
        const errorDiv = document.getElementById('error');
        const loginBtn = document.getElementById('loginBtn');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            errorDiv.style.display = 'none';
            loginBtn.disabled = true;
            loginBtn.textContent = 'Unlocking cave...';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard.html';
                } else {
                    errorDiv.textContent = data.error || 'The cave door remains sealed';
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.textContent = 'Connection error. The mountain echoes with silence.';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Enter Cave';
            }
        });
    </script>
</body>
</html>

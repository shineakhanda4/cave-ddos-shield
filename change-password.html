<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Cave DDoS Shield</title>
    <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏔️</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-gradient: linear-gradient(135deg, #2d4a7c 0%, #1a2d4e 100%);
            --cave-accent: #c4a668;
            --bg-dark: #0a0e1a;
            --bg-card: rgba(20, 30, 50, 0.7);
            --border-color: rgba(196, 166, 104, 0.15);
            --text-primary: #f0e6d3;
            --text-secondary: #a89878;
            --success: #5d9b5d;
            --danger: #c45a5a;
            --warning: #d4a84b;
        }
        
        body {
            font-family: 'Segoe UI', 'Caveat', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a2536 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 100"><path d="M0 100 L50 40 L100 60 L150 20 L200 50 L200 100 Z" fill="rgba(196,166,104,0.03)"/></svg>') repeat-x bottom;
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(196, 166, 104, 0.1) inset;
            position: relative;
            z-index: 1;
        }
        
        .container::before {
            content: '🏔️';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 30px;
            background: var(--bg-card);
            padding: 0 15px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #c4a668 0%, #e8d5a8 50%, #c4a668 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(196, 166, 104, 0.2);
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 0.9em;
            font-style: italic;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
            font-size: 0.9em;
            letter-spacing: 0.5px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(10, 14, 26, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--cave-accent);
            background: rgba(20, 30, 50, 0.8);
            box-shadow: 0 0 15px rgba(196, 166, 104, 0.2);
        }
        
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: rgba(196, 166, 104, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }
        
        .strength-weak { background: var(--danger); width: 33%; }
        .strength-medium { background: var(--warning); width: 66%; }
        .strength-strong { background: var(--success); width: 100%; }
        
        .password-hint {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 5px;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2d4a7c 0%, #1a2d4e 100%);
            border: 1px solid var(--cave-accent);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(45, 74, 124, 0.3), 0 0 15px rgba(196, 166, 104, 0.2);
            border-color: var(--cave-accent);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: rgba(20, 30, 50, 0.8);
            margin-top: 10px;
            border-color: var(--border-color);
        }
        
        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: var(--cave-accent);
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9em;
            display: none;
        }
        
        .alert-success {
            background: rgba(93, 155, 93, 0.15);
            border: 1px solid var(--success);
            color: #7dcc7d;
        }
        
        .alert-error {
            background: rgba(196, 90, 90, 0.15);
            border: 1px solid var(--danger);
            color: #e07070;
        }
        
        .requirements {
            background: rgba(10, 14, 26, 0.5);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        
        .requirements h3 {
            font-size: 0.9em;
            margin-bottom: 10px;
            color: var(--cave-accent);
        }
        
        .requirements ul {
            list-style: none;
            padding: 0;
        }
        
        .requirements li {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 5px;
            padding-left: 20px;
            position: relative;
        }
        
        .requirements li::before {
            content: '◆';
            position: absolute;
            left: 0;
            color: var(--cave-accent);
            opacity: 0.3;
            font-size: 0.8em;
        }
        
        .requirements li.valid::before {
            content: '✓';
            opacity: 1;
            color: var(--success);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏔️ Change Password</h1>
            <p>Secure your cave access</p>
        </div>
        
        <div id="alertSuccess" class="alert alert-success"></div>
        <div id="alertError" class="alert alert-error"></div>
        
        <div class="requirements">
            <h3>Password Requirements:</h3>
            <ul>
                <li id="req-length">At least 6 characters</li>
                <li id="req-match">Passwords match</li>
            </ul>
        </div>
        
        <form id="changePasswordForm">
            <div class="form-group">
                <label for="currentPassword">Current Password</label>
                <input type="password" id="currentPassword" required>
            </div>
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required>
                <div class="password-strength">
                    <div class="password-strength-bar" id="strengthBar"></div>
                </div>
                <div class="password-hint" id="strengthText"></div>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm New Password</label>
                <input type="password" id="confirmPassword" required>
            </div>
            
            <button type="submit" class="btn" id="submitBtn">Update Password</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/dashboard.html'">Return to Cave</button>
        </form>
    </div>
    
    <script>
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }
        
        const form = document.getElementById('changePasswordForm');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');
        
        // Password strength checker
        newPasswordInput.addEventListener('input', () => {
            const password = newPasswordInput.value;
            const length = password.length;
            
            let strength = 0;
            if (length >= 6) strength++;
            if (length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'password-strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                strengthText.textContent = 'Weak - Like a small pebble';
                strengthText.style.color = '#c45a5a';
            } else if (strength <= 3) {
                strengthBar.classList.add('strength-medium');
                strengthText.textContent = 'Medium - Solid stone';
                strengthText.style.color = '#d4a84b';
            } else {
                strengthBar.classList.add('strength-strong');
                strengthText.textContent = 'Strong - Cave fortress!';
                strengthText.style.color = '#5d9b5d';
            }
            
            checkRequirements();
        });
        
        confirmPasswordInput.addEventListener('input', checkRequirements);
        
        function checkRequirements() {
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            const reqLength = document.getElementById('req-length');
            const reqMatch = document.getElementById('req-match');
            
            if (newPassword.length >= 6) {
                reqLength.classList.add('valid');
            } else {
                reqLength.classList.remove('valid');
            }
            
            if (newPassword && confirmPassword && newPassword === confirmPassword) {
                reqMatch.classList.add('valid');
            } else {
                reqMatch.classList.remove('valid');
            }
        }
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (newPassword !== confirmPassword) {
                showAlert('error', 'Passwords do not match');
                return;
            }
            
            if (newPassword.length < 6) {
                showAlert('error', 'Password must be at least 6 characters');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Updating...';
            
            try {
                const response = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Password changed! Returning to cave...');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 2000);
                } else {
                    showAlert('error', data.error || 'Failed to change password');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Update Password';
                }
            } catch (err) {
                showAlert('error', 'Connection error. The cave walls are shaking.');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Update Password';
            }
        });
        
        function showAlert(type, message) {
            const alertId = type === 'success' ? 'alertSuccess' : 'alertError';
            const alert = document.getElementById(alertId);
            alert.textContent = message;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
